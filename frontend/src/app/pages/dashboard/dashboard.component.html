<div class="min-h-screen bg-[#090E13] text-white">

  <!-- TOPBAR -->

  <header class="border-b border-[#1F2937] bg-[#0C1118]/90 backdrop-blur sticky top-0 z-40">

    <div class="max-w-[1700px] mx-auto px-4 lg:px-8 h-16 flex items-center justify-between">

      <div class="flex items-center gap-3">

        <div class="w-10 h-10 rounded-xl bg-[#00FF9D] text-black flex items-center justify-center font-black">
          F
        </div>

        <div>
          <div class="font-bold tracking-wide">
            XAcademy Challenge - FIFA Players
          </div>

          <div class="text-xs text-gray-400">
            Player Analytics
          </div>
        </div>


      </div>

      <!-- SEARCH -->

      <div class="hidden md:flex items-center w-[420px]">

        <input
          type="text"
          placeholder="Search player..."
          class="w-full rounded-2xl bg-[#131B25] border border-[#253041] px-4 py-2 outline-none focus:border-[#00FF9D]"
        />

      </div>

      <!-- MOBILE FILTER BTN -->

      <button
        class="lg:hidden px-4 py-2 rounded-xl bg-[#131B25]"
        (click)="mobileFilters = !mobileFilters"
      >
        Filters
      </button>

    </div>

  </header>

  <!-- CONTENT -->

  <div class="max-w-[1700px] mx-auto px-4 lg:px-8 py-6">

    <div class="flex gap-6 relative">

      <!-- MOBILE OVERLAY -->

      <div
        *ngIf="mobileFilters"
        class="fixed inset-0 bg-black/50 z-40 lg:hidden"
        (click)="mobileFilters=false"
      ></div>

      <!-- SIDEBAR -->

      <aside
        class="
          fixed lg:sticky
          top-0 lg:top-6
          left-0
          z-50 lg:z-10
          h-screen lg:h-fit
          w-[280px]
          bg-[#111827]
          border-r lg:border
          border-[#1F2937]
          lg:rounded-3xl
          p-6
          transition-transform duration-300
          lg:translate-x-0
        "
        [class.translate-x-0]="mobileFilters"
        [class.-translate-x-full]="!mobileFilters"
      >

        <!-- MOBILE HEADER -->

        <div class="flex justify-between items-center mb-6 lg:hidden">

          <h2 class="font-bold">
            Filters
          </h2>

          <button (click)="mobileFilters=false">
            ✕
          </button>

        </div>

        <!-- POSITION -->

        <div class="mb-8">

          <h3 class="text-sm text-gray-400 mb-3">
            Position
          </h3>

          <div class="flex flex-wrap gap-2">

            <button
              *ngFor="let pos of positions"
              (click)="togglePosition(pos)"
              class="px-3 py-2 rounded-xl text-sm transition"
              [ngClass]="selectedPositions.includes(pos)
                ? 'bg-[#00FF9D] text-black font-semibold'
                : 'bg-[#1A222E] text-gray-300'"
            >
              {{ pos }}
            </button>

          </div>

        </div>

        <!-- CLUB -->

        <div class="mb-8">

          <h3 class="text-sm text-gray-400 mb-3">
            Club
          </h3>

          <input
            list="clubs"
            [(ngModel)]="club"
            placeholder="Search club..."
            class="w-full rounded-2xl bg-[#1A222E] border border-[#2B3545] px-4 py-3 outline-none focus:border-[#00FF9D]"
          />

          <datalist id="clubs">

            <option *ngFor="let club of clubs">
              {{ club }}
            </option>

          </datalist>

        </div>

        <!-- FIFA VERSION -->

        <div class="mb-8">

          <h3 class="text-sm text-gray-400 mb-3">
            FIFA Version
          </h3>

          <div class="flex flex-wrap gap-2">

            <button
              *ngFor="let v of fifaVersions"
              (click)="selectFifa(v)"
              class="px-3 py-2 rounded-xl text-sm transition"
              [ngClass]="selectedFifa === v
                ? 'bg-[#00FF9D] text-black'
                : 'bg-[#1A222E] text-gray-300'"
            >
              {{ v }}
            </button>

          </div>

        </div>

        <!-- GENDER -->

        <div>

          <h3 class="text-sm text-gray-400 mb-3">
            Gender
          </h3>

          <div class="flex bg-[#1A222E] rounded-2xl p-1">

            <button
              class="flex-1 py-2 rounded-xl transition"
              [ngClass]="gender==='all'
                ? 'bg-[#00FF9D] text-black'
                : 'text-gray-300'"
              (click)="gender='all'"
            >
              All
            </button>

            <button
              class="flex-1 py-2 rounded-xl transition"
              [ngClass]="gender==='male'
                ? 'bg-[#00FF9D] text-black'
                : 'text-gray-300'"
              (click)="gender='male'"
            >
              Men
            </button>

            <button
              class="flex-1 py-2 rounded-xl transition"
              [ngClass]="gender==='female'
                ? 'bg-[#00FF9D] text-black'
                : 'text-gray-300'"
              (click)="gender='female'"
            >
              Women
            </button>

          </div>

        </div>

      </aside>

      <!-- MAIN -->

      <main class="flex-1 min-w-0 lg:ml-0">

        <div class="bg-[#111827] border border-[#1F2937] rounded-3xl overflow-hidden">

          <!-- TABLE HEADER -->

          <div class="px-6 py-4 border-b border-[#1F2937] flex justify-between items-center">

            <div>

              <h2 class="text-xl font-bold">
                Players
              </h2>

              <p class="text-sm text-gray-400">
                {{ players.length }} players
              </p>

            </div>

          </div>

          <!-- TABLE -->

          <div class="overflow-x-auto">

            <table class="w-full min-w-[600px]">

              <thead class="bg-[#0E1621] text-gray-400 text-sm">

                <tr>

                  <th class="text-left px-6 py-4">
                    Image
                  </th>

                  <th class="text-left px-6 py-4">
                    Player
                  </th>

                  <th class="text-left px-6 py-4">
                    Club
                  </th>

                </tr>

              </thead>

              <tbody>

                <tr
                  *ngFor="let p of players"
                  class="border-t border-[#1F2937] hover:bg-[#131B25] transition"
                >

                  <td class="px-6 py-4">

                    <img
                      [src]="p.image"
                      class="w-12 h-12 rounded-full object-cover"
                    />

                  </td>

                  <td class="px-6 py-4 font-medium">

                    {{ p.name }}

                  </td>

                  <td class="px-6 py-4 text-gray-300">

                    {{ p.club }}

                  </td>

                </tr>

              </tbody>

            </table>

          </div>

          <!-- PAGINATION -->

          <div class="px-6 py-4 border-t border-[#1F2937] flex justify-center gap-2">

            <button class="px-4 py-2 rounded-xl bg-[#1A222E]">
              Prev
            </button>

            <button class="px-4 py-2 rounded-xl bg-[#00FF9D] text-black">
              1
            </button>

            <button class="px-4 py-2 rounded-xl bg-[#1A222E]">
              2
            </button>

            <button class="px-4 py-2 rounded-xl bg-[#1A222E]">
              Next
            </button>

          </div>

        </div>

      </main>

    </div>

  </div>

</div>
