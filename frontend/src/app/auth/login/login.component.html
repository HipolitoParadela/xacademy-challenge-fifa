<div class="min-h-screen flex items-center justify-center px-6 bg-[#090E13] relative overflow-hidden">

  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(0,255,157,.12),transparent_30%)]">
  </div>

  <div class="w-full max-w-md relative z-10">

    <div class="fifa-card p-8 backdrop-blur-lg">
      <div class="text-center mb-8">

        <p class="text-gray-400 mt-2">
          Sports Analytics Platform
        </p>

      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

        <div>

          <label class="block text-sm mb-2 text-gray-300">
            Usuario
          </label>

          <input type="text" formControlName="username"
            class="w-full rounded-xl bg-[#1A222E] border border-gray-700 px-4 py-3 text-white outline-none focus:border-[#00FF9D] transition" />

        </div>

        <div>

          <label class="block text-sm mb-2 text-gray-300">
            Contraseña
          </label>

          <input type="password" formControlName="password"
            class="w-full rounded-xl bg-[#1A222E] border border-gray-700 px-4 py-3 text-white outline-none focus:border-[#00FF9D] transition" />

        </div>

        <div *ngIf="error" class="text-red-400 text-sm">

          {{ error }}

        </div>

        <button type="submit" [disabled]="loading"
          class="w-full rounded-xl bg-[#00FF9D] text-black font-semibold py-3 transition hover:opacity-90 disabled:opacity-50">

          <span *ngIf="!loading">
            Ingresar
          </span>

          <span *ngIf="loading">
            Validando...
          </span>

        </button>

      </form>

    </div>

  </div>

</div>
